<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Dashboard – Login & Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="wb1.css">
</head>
<body>

<!-- LOGIN -->
<div class="auth-wrap" id="loginPage">
  <div class="auth-card">
    <h2>Welcome Back</h2>

    <button class="btn btn-google">🔵 Continue with Google</button>
    <div class="divider">or</div>

    <div class="field">
      <label class="label">Email</label>
      <input class="input" type="email" id="email" placeholder="you@gmail.com" />
    </div>

    <div class="field">
      <label class="label">Password</label>
      <input class="input" type="password" id="password" placeholder="••••••••" />
    </div>

    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="profile-page hidden" id="dashboard">
  <div class="profile-container">
    <h2>Profile Details</h2>
    <div class="card">
      <div class="avatar-upload full">
        <img id="profileImg" src="https://via.placeholder.com/100">
        <input type="file" onchange="previewImage(event)">
      </div>

      <div class="grid">
        <input class="input" placeholder="Full Name">
        <input class="input" placeholder="Phone Number">
        <input class="input full" id="profileEmail" placeholder="Email" disabled>

        <input class="input" placeholder="Street">
        <input class="input" placeholder="City">
        <input class="input" placeholder="State">
        <input class="input" placeholder="ZIP Code">

        <input class="input" placeholder="ID Number">
        <input class="input" type="date">

        <select class="input">
          <option>Gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>

        <textarea class="input full" placeholder="Bio"></textarea>

        <input class="input full" type="file">
      </div>

      <button class="btn save">Save Profile</button>
      <button class="btn" onclick="logout()" style="margin-top: 10px;">Logout</button>
    </div>
  </div>
</div>

<script>
  function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(email && password) {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");
      document.getElementById("profileEmail").value = email;
    } else {
      alert("Enter email & password");
    }
  }

  function logout() {
    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
  }

  function previewImage(event) {
    const file = event.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById("profileImg").src = e.target.result;
        document.getElementById("topAvatar").src = e.target.result;
      };
      reader.readAsDataURL(file);
    }
  }
</script>

</body>
</html>

function previewImage(event) {
  let reader = new FileReader();
  reader.onload = function() {
    document.getElementById("profileImg").src = reader.result;
    document.getElementById("topAvatar").src = reader.result;
  }
  reader.readAsDataURL(event.target.files[0]);
}
</script>

</body>
</html>
